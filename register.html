<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Register • Shmuelal</title>
    <link rel="icon" href="images/core/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="index.html">
            <img src="images/core/logo.png" alt="Shmuelal Logo" class="logo">
        </a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="order.html">Order</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="gallery.html">Gallery</a></li>
            </ul>
        </nav>
    </header>
    <main style="min-height: 64.15vh;">
        <form class="auth-form">
            <h2>Register</h2>
            <div class="form-group">
                <label for="register-email">Email:</label>
                <input type="email" id="register-email" name="email">
            </div>
            <div class="form-group">
                <label for="register-password">Password:</label>
                <input type="password" id="register-password" name="password">
            </div>
            <div class="form-group">
                <label for="register-confirm-password">Confirm Password:</label>
                <input type="password" id="register-confirm-password" name="confirm_password">
            </div>
            <button type="submit">Register</button>
            <p>Already have an account? <a href="login.html">Login</a></p>
        </form>
    </main>
    <footer>
        <p>Copyright © 2024 Shmuelal Ltd. All rights reserved.</p>
        <hr>
        <div>
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms of Service</a>
            <a href="contact.html">Contact Us</a>
        </div>
    </footer>
    <script>
        document.getElementsByClassName("auth-form")[0].addEventListener("submit", function(event) {
            event.preventDefault();
            email = document.getElementById("register-email");
            password = document.getElementById("register-password");
            confirmPassword = document.getElementById("register-confirm-password");

            email.style.borderColor = "#ddd";
            password.style.borderColor = "#ddd";
            confirmPassword.style.borderColor = "#ddd";

            if (email.value !== "" && password.value !== "" && confirmPassword.value !== "") {
                alert("Hey there! 👋 Our registration service is currently unavailable. Thanks for your patience!");
            } else {

                if (email.value === "") {
                    email.style.borderColor = "#ff0000";
                }

                if (password.value === "") {
                    password.style.borderColor = "#ff0000";
                }

                if (confirmPassword.value === "") {
                    confirmPassword.style.borderColor = "#ff0000";
                }
            }
        });
    </script>
</body>
</html>
