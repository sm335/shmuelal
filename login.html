<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login • Shmuelal</title>
    <link rel="icon" href="images/core/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="index.html">
            <img src="images/core/logo.png" alt="Shmuelal Logo" class="logo">
        </a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="order.html">Order</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="gallery.html">Gallery</a></li>
            </ul>
        </nav>
    </header>
    <main style="min-height: 64.15vh;">
        <form class="auth-form" action="your-login-processing-url" method="POST">
            <h2>Login</h2>
            <div class="form-group">
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" name="email">
            </div>
            <div class="form-group">
                <label for="login-password">Password:</label>
                <input type="password" id="login-password" name="password">
            </div>
            <button type="submit">Log In</button>
            <p>Don't have an account? <a href="register.html">Register</a></p>
        </form>
    </main>
    <footer>
        <p>Copyright © 2024 Shmuelal Ltd. All rights reserved.</p>
        <hr>
        <div>
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms of Service</a>
            <a href="contact.html">Contact Us</a>
        </div>
    </footer>
    <script>
        document.getElementsByClassName("auth-form")[0].addEventListener("submit", function(event) {
            event.preventDefault();
            email = document.getElementById("login-email");
            password = document.getElementById("login-password");

            email.style.borderColor = "#ddd";
            password.style.borderColor = "#ddd";

            if (email.value !== "" && password.value !== "") {
                alert("Oops! It seems like our login feature is taking a coffee break ☕️. Try logging in again later!");
            } else {
                if (email.value === "") {
                    email.style.borderColor = "#ff0000";
                }

                if (password.value === "") {
                    password.style.borderColor = "#ff0000";
                }
            }
        });
    </script>
</body>
</html>
